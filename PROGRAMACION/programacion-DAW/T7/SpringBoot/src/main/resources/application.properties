spring.application.name=demo
server.port=9999
# NOTA: Como aún no tienes una base de datos MySQL configurada para este proyecto,
# hemos excluido temporalmente la autoconfiguración de JPA/MySQL para que Spring Boot arranque sin errores.
# Cuando quieras conectar tu base de datos, BORRA o COMENTA la siguiente línea:
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration,org.springframework.boot.autoconfigure.orm.jpa.HibernateJpaAutoConfiguration

# Una vez tengas la base de datos lista, descomenta y rellena estos datos:
# spring.datasource.url=jdbc:mysql://localhost:3306/tu_base_de_datos
# spring.datasource.username=tu_usuario
# spring.datasource.password=tu_contraseña
# spring.jpa.hibernate.ddl-auto=update
