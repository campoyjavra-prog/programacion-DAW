<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title th:text="'Pokémon #' + ${pokemon.numero} + ' - ' + ${pokemon.nombre}">Pokémon</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #1a1c2c 0%, #42194a 100%);
            color: #fff;
            font-family: 'Outfit', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
        }

        .pokemon-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 30px;
            padding: 2rem;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.3);
        }

        .pokemon-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.4);
            border-color: rgba(255, 255, 255, 0.3);
        }

        .pokemon-img {
            max-width: 300px;
            filter: drop-shadow(0 10px 20px rgba(0, 0, 0, 0.5));
            animation: float 4s ease-in-out infinite;
        }

        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-20px); }
            100% { transform: translateY(0px); }
        }

        .type-badge {
            text-transform: capitalize;
            padding: 8px 20px;
            border-radius: 50px;
            font-weight: 700;
            margin: 0 5px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
            font-size: 0.9rem;
        }

        .stat-bar {
            background: rgba(255, 255, 255, 0.1);
            height: 12px;
            border-radius: 10px;
            overflow: hidden;
            margin-bottom: 20px;
        }

        .stat-progress {
            height: 100%;
            border-radius: 10px;
            background: linear-gradient(90deg, #ff416c 0%, #ff4b2b 100%);
        }

        .pokemon-id {
            font-size: 5rem;
            font-weight: 900;
            color: rgba(255, 255, 255, 0.03);
            position: absolute;
            top: -20px;
            right: 20px;
            z-index: -1;
        }

        .btn-random {
            background: linear-gradient(90deg, #ed4264 0%, #ffedbc 100%);
            border: none;
            color: #1a1c2c;
            font-weight: 800;
            padding: 12px 30px;
            border-radius: 50px;
            transition: all 0.3s;
        }

        .btn-random:hover {
            transform: scale(1.05);
            box-shadow: 0 10px 20px rgba(237, 66, 100, 0.4);
        }

        /* Colores por tipo */
        .type-fire { background-color: #ff421c; }
        .type-water { background-color: #0b78e4; }
        .type-grass { background-color: #48d0b0; }
        .type-electric { background-color: #ffd76f; color: #1a1c2c; }
        .type-psychic { background-color: #ff65d5; }
        .type-ice { background-color: #76d1ff; color: #1a1c2c; }
        .type-dragon { background-color: #7233ff; }
        .type-dark { background-color: #5b5466; }
        .type-fairy { background-color: #ff98ec; }
        .type-normal { background-color: #a8a878; }
        .type-fighting { background-color: #c03028; }
        .type-flying { background-color: #a890f0; }
        .type-poison { background-color: #a040a0; }
        .type-ground { background-color: #e0c068; }
        .type-rock { background-color: #b8a038; }
        .type-bug { background-color: #a8b820; }
        .type-ghost { background-color: #705898; }
        .type-steel { background-color: #b8b8d0; }
    </style>
</head>

<body>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-lg-6 position-relative">
                <div class="pokemon-id" th:text="'#' + ${pokemon.numero}">#001</div>
                <div class="pokemon-card text-center">
                    <img th:src="@{${pokemon.imagen}}" class="pokemon-img mb-4" th:alt="${pokemon.nombre}">
                    
                    <h1 class="display-4 fw-bold text-capitalize mb-3" th:text="${pokemon.nombre}">Nombre</h1>
                    
                    <div class="mb-4">
                        <span th:each="tipo : ${pokemon.tipos}" 
                              th:class="'type-badge type-' + ${tipo}" 
                              th:text="${tipo}">Fuego</span>
                    </div>

                    <div class="text-start px-md-4">
                        <div class="d-flex justify-content-between mb-1">
                            <span class="fw-bold">Vida (HP)</span>
                            <span th:text="${pokemon.hp}">100</span>
                        </div>
                        <div class="stat-bar">
                            <div class="stat-progress" th:style="'width:' + (${pokemon.hp} * 100 / 255) + '%; background: linear-gradient(90deg, #ff416c, #ff4b2b)'"></div>
                        </div>

                        <div class="d-flex justify-content-between mb-1">
                            <span class="fw-bold">Ataque</span>
                            <span th:text="${pokemon.ataque}">100</span>
                        </div>
                        <div class="stat-bar">
                            <div class="stat-progress" th:style="'width:' + (${pokemon.ataque} * 100 / 190) + '%; background: linear-gradient(90deg, #f09819, #edde5d)'"></div>
                        </div>

                        <div class="d-flex justify-content-between mb-1">
                            <span class="fw-bold">Defensa</span>
                            <span th:text="${pokemon.defensa}">100</span>
                        </div>
                        <div class="stat-bar">
                            <div class="stat-progress" th:style="'width:' + (${pokemon.defensa} * 100 / 230) + '%; background: linear-gradient(90deg, #2193b0, #6dd5ed)'"></div>
                        </div>
                    </div>

                    <div class="mt-4 d-flex justify-content-center gap-3">
                        <a th:href="'/pokemon/' + ${idAnterior}" 
                           class="btn btn-random" 
                           th:classappend="${id == 1} ? 'disabled' : ''"
                           style="background: linear-gradient(90deg, #bdc3c7, #2c3e50); border: none; color: white;">
                           ← Anterior
                        </a>
                        <a th:href="'/pokemon/' + ${idSiguiente}" 
                           class="btn btn-random">
                           Siguiente →
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
