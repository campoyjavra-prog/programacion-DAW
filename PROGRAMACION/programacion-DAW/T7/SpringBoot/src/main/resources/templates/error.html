<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Error</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #1a1c2c; color: white; height: 100vh; display: flex; align-items: center; justify-content: center; text-align: center;}
        .error-container { padding: 40px; border-radius: 20px; background: rgba(255,100,100,0.1); border: 1px solid rgba(255,100,100,0.3); }
    </style>
</head>
<body>
    <div class="error-container">
        <h1 class="display-1">Oops!</h1>
        <p class="lead" th:text="${error}">Ha ocurrido un error inesperado.</p>
        <a href="/pokemon" class="btn btn-outline-light mt-3">Volver a intentarlo</a>
    </div>
</body>
</html>
