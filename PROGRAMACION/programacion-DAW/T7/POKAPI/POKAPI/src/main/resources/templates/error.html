<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Error 404 - Pokédex</title>
    <!-- Bootstrap 5 CSS CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN" crossorigin="anonymous">
    <style>
        .error-container {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            background-color: #f8f9fa;
        }
        .error-container h1 {
            font-size: 6rem;
            font-weight: bold;
            color: #dc3545;
        }
        .error-container img {
            max-width: 300px;
            margin: 20px 0;
            filter: drop-shadow(0 10px 10px rgba(0,0,0,0.2));
        }
        .button {
            display: inline-block;
            padding: 10px 25px;
            font-size: 1.2rem;
            color: #fff;
            background-color: #198754;
            border-radius: 50px;
            text-decoration: none;
            transition: background-color 0.3s ease;
        }
        .button:hover {
            background-color: #146c43;
            color: #fff;
        }
    </style>
</head>
<body>

    <div class="error-container">
        <h1>404</h1>
        <h2>Página no encontrada</h2>
        <p class="text-muted" th:if="${error}" th:text="${error}"></p>
        
        <!-- Imagen de Charizard -->
        <img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/6.png" alt="404 error">
        
        <a class="button mt-3" th:href="@{/}">Ir a la Pokédex</a>
    </div>

</body>
</html>
