<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detalle del Pokémon</title>
    <!-- Bootstrap 5 CSS CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN" crossorigin="anonymous">
</head>
<body class="bg-light">

    <!-- Navbar verde -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-success mb-4">
        <div class="container-fluid">
            <a class="navbar-brand" href="/">Pokédex</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNavDropdown" aria-controls="navbarNavDropdown" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNavDropdown">
                <ul class="navbar-nav">
                    <li class="nav-item dropdown">
                        <a class="nav-link dropdown-toggle" href="#" id="navbarDropdownMenuLink" role="button" data-bs-toggle="dropdown" aria-expanded="false">
                            Generaciones
                        </a>
                        <ul class="dropdown-menu" aria-labelledby="navbarDropdownMenuLink">
                            <li><a class="dropdown-item" href="/generaciones/1">Primera Generación</a></li>
                            <li><a class="dropdown-item" href="/generaciones/2">Segunda Generación</a></li>
                            <li><a class="dropdown-item" href="/generaciones/3">Tercera Generación</a></li>
                        </ul>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Contenedor principal -->
    <div class="container d-flex justify-content-center">
        <div class="card shadow" style="width: 25rem;">
            <div class="card-header text-center bg-dark text-white">
                <h3 class="mb-0 text-capitalize">
                    #<span th:text="${pokemon.numero}"></span> - <span th:text="${pokemon.nombre}"></span>
                </h3>
            </div>
            <div class="text-center p-3" style="background-color: #f8f9fa;">
                <img th:src="${pokemon.imagen}" class="img-fluid" alt="Imagen del Pokémon" style="max-height: 250px;">
            </div>
            <div class="card-body">
                <h5 class="card-title text-center text-secondary">Estadísticas</h5>
                <ul class="list-group list-group-flush mb-3">
                    <li class="list-group-item d-flex justify-content-between align-items-center">
                        <strong>HP</strong>
                        <span class="badge bg-danger rounded-pill" th:text="${pokemon.hp}"></span>
                    </li>
                    <li class="list-group-item d-flex justify-content-between align-items-center">
                        <strong>Ataque</strong>
                        <span class="badge bg-warning text-dark rounded-pill" th:text="${pokemon.ataque}"></span>
                    </li>
                    <li class="list-group-item d-flex justify-content-between align-items-center">
                        <strong>Defensa</strong>
                        <span class="badge bg-info text-dark rounded-pill" th:text="${pokemon.defensa}"></span>
                    </li>
                </ul>

                <h5 class="card-title text-center text-secondary">Tipos</h5>
                <div class="d-flex justify-content-center flex-wrap gap-2 mb-3">
                    <span th:each="tipo : ${pokemon.tipos}" 
                          class="badge bg-primary text-uppercase px-3 py-2" 
                          th:text="${tipo}"></span>
                </div>
                
                <div class="text-center mt-4">
                    <a th:href="@{/}" class="btn btn-outline-success">Volver a la Pokédex</a>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap 5 JS Bundle CDN -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-C6RzsynM9kWDrMNeT87bh95OGNyZPhcTNXj1NW7RuBCsyN/o0jlpcV8Qyq46cDfL" crossorigin="anonymous"></script>
</body>
</html>
